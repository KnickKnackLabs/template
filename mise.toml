[settings]
quiet = true
task_output = "interleave"
experimental = true

[plugins]
shiv = "https://github.com/KnickKnackLabs/vfox-shiv"

[tools]
bats = "1.13.0"
gum = "0.17.0"
"shiv:codebase" = "0.3"
"shiv:readme" = "0.3"

[_.codebase]
lint = [
  "mise-settings",
  "bats-test-helper",
  "bats-test-task",
  "mcr-scope",
  "or-true",
  "shellcheck",
  "gum-table",
  "caller-pwd-contract",
  "github-actions",
]
